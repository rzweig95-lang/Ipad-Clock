name: Update weather

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Fetch weather and write weather.json
        run: |
          python << 'PY'
          import json
          import urllib.request

          LAT = 40.674400
          LON = -79.989082

          url = (
              "https://api.open-meteo.com/v1/forecast"
              f"?latitude={LAT}"
              f"&longitude={LON}"
              "&current=temperature_2m,weather_code"
              "&daily=weather_code,temperature_2m_max,temperature_2m_min"
              "&temperature_unit=fahrenheit"
              "&timezone=auto"
              "&forecast_days=4"
          )

          def code_to_text(code):
              mapping = {
                  0: "Clear sky",
                  1: "Mostly clear",
                  2: "Partly cloudy",
                  3: "Overcast",
                  45: "Fog",
                  48: "Fog",
                  51: "Light drizzle",
                  53: "Drizzle",
                  55: "Heavy drizzle",
                  56: "Freezing drizzle",
                  57: "Freezing drizzle",
                  61: "Light rain",
                  63: "Rain",
                  65: "Heavy rain",
                  66: "Freezing rain",
                  67: "Freezing rain",
                  71: "Light snow",
                  73: "Snow",
                  75: "Heavy snow",
                  77: "Snow",
                  80: "Rain showers",
                  81: "Rain showers",
                  82: "Heavy rain showers",
                  85: "Snow showers",
                  86: "Snow showers",
                  95: "Thunderstorm",
                  96: "Thunderstorm",
                  99: "Thunderstorm",
              }
              return mapping.get(code, "Unknown")

          with urllib.request.urlopen(url, timeout=30) as r:
              data = json.load(r)

          current = data["current"]
          daily = data["daily"]

          out = {
              "temp": round(current["temperature_2m"]),
              "desc": code_to_text(current["weather_code"]),
              "high": round(daily["temperature_2m_max"][0]),
              "low": round(daily["temperature_2m_min"][0]),
              "days": [
                  {
                      "name": "Tomorrow",
                      "high": round(daily["temperature_2m_max"][1]),
                      "low": round(daily["temperature_2m_min"][1]),
                  },
                  {
                      "name": "Day 2",
                      "high": round(daily["temperature_2m_max"][2]),
                      "low": round(daily["temperature_2m_min"][2]),
                  },
                  {
                      "name": "Day 3",
                      "high": round(daily["temperature_2m_max"][3]),
                      "low": round(daily["temperature_2m_min"][3]),
                  },
              ]
          }

          with open("weather.json", "w", encoding="utf-8") as f:
              json.dump(out, f, indent=2)
          PY

      - name: Commit updated weather.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add weather.json
          git diff --staged --quiet || git commit -m "Update weather data"
          git push
