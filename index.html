<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Clock Weather" />
<title>iPad Clock + Weather</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #0f172a;
  color: #ffffff;
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;
}

body {
  display: table;
  width: 100%;
  height: 100%;
}

.screen {
  display: table-cell;
  vertical-align: middle;
  text-align: center;
  padding: 16px;
  box-sizing: border-box;
  background: linear-gradient(to bottom, #0f172a 0%, #1e293b 100%);
  position: relative;
}

.bg-layer {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}

.sky-day { background: linear-gradient(to bottom, #4da3ff 0%, #7fc4ff 42%, #d7ecff 100%); }
.sky-night { background: linear-gradient(to bottom, #091225 0%, #16213e 45%, #22345f 100%); }
.sky-cloudy { background: linear-gradient(to bottom, #596579 0%, #7b889d 45%, #b7c1cf 100%); }
.sky-rain { background: linear-gradient(to bottom, #2b3445 0%, #4b5a73 55%, #73839a 100%); }
.sky-snow { background: linear-gradient(to bottom, #8294ad 0%, #a7b6c8 50%, #dbe5f0 100%); }

.bg-fill {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1.8s ease;
}

.bg-fill.active { opacity: 1; }

.sun {
  position: absolute;
  top: 42px;
  right: 60px;
  width: 96px;
  height: 96px;
  border-radius: 50%;
  background: rgba(255, 222, 120, 0.95);
  box-shadow: 0 0 40px rgba(255, 210, 120, 0.85), 0 0 90px rgba(255, 210, 120, 0.45);
  animation: floatSun 12s ease-in-out infinite;
}

.moon {
  position: absolute;
  top: 42px;
  right: 60px;
  width: 86px;
  height: 86px;
  border-radius: 50%;
  background: rgba(240, 244, 255, 0.95);
  box-shadow: 0 0 30px rgba(240, 244, 255, 0.45);
  animation: floatMoon 14s ease-in-out infinite;
}

.moon:after {
  content: '';
  position: absolute;
  top: 8px;
  left: 20px;
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: rgba(18, 31, 58, 0.95);
}

.cloud {
  position: absolute;
  width: 150px;
  height: 50px;
  background: rgba(255,255,255,0.42);
  border-radius: 50px;
  animation: driftCloud 36s linear infinite;
}

.cloud:before,
.cloud:after {
  content: '';
  position: absolute;
  background: rgba(255,255,255,0.42);
  border-radius: 50%;
}

.cloud:before {
  width: 60px;
  height: 60px;
  left: 18px;
  top: -24px;
}

.cloud:after {
  width: 78px;
  height: 78px;
  right: 18px;
  top: -36px;
}

.cloud.c1 { top: 84px; left: -180px; animation-duration: 42s; }
.cloud.c2 { top: 150px; left: -240px; transform: scale(0.8); animation-duration: 56s; opacity: 0.7; }
.cloud.c3 { top: 120px; left: -300px; transform: scale(1.15); animation-duration: 48s; opacity: 0.55; }

.rain-drop, .snow-flake, .star {
  position: absolute;
  opacity: 0.8;
}

.rain-drop {
  width: 2px;
  height: 18px;
  background: rgba(200, 230, 255, 0.7);
  animation: rainFall 1.3s linear infinite;
}

.snow-flake {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.88);
  animation: snowFall 7s linear infinite;
}

.star {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: rgba(255,255,255,0.95);
  box-shadow: 0 0 8px rgba(255,255,255,0.65);
  animation: twinkle 3s ease-in-out infinite;
}

.content {
  position: relative;
  z-index: 2;
  transition: transform 2s ease;
}

.date {
  font-size: 30px;
  letter-spacing: 1px;
  margin-bottom: 8px;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

.time {
  font-size: 118px;
  font-weight: bold;
  line-height: 1;
  margin: 8px 0 18px 0;
  letter-spacing: 2px;
  text-shadow: 0 2px 4px rgba(0,0,0,0.18);
}

.weather-box {
  width: 100%;
  max-width: 720px;
  margin: 0 auto;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 24px;
  padding: 20px;
  box-sizing: border-box;
  box-shadow: 0 12px 40px rgba(0,0,0,0.22);
}

.weather-main { font-size: 58px; font-weight: bold; margin-bottom: 4px; }
.weather-desc { font-size: 24px; margin-bottom: 8px; }
.weather-details { font-size: 21px; line-height: 1.55; }

.weather-top {
  display: table;
  width: 100%;
  margin-bottom: 10px;
}

.weather-top-left,
.weather-top-right {
  display: table-cell;
  vertical-align: middle;
}

.weather-top-right {
  width: 110px;
  text-align: center;
}

.weather-icon { font-size: 64px; }

.prediction {
  margin-top: 10px;
  font-size: 22px;
  line-height: 1.45;
  text-align: left;
}

.daily-wrap {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.14);
  text-align: left;
}

.daily-title {
  font-size: 18px;
  margin-bottom: 10px;
  text-transform: uppercase;
  opacity: 0.85;
}

.daily-row {
  white-space: nowrap;
  overflow: hidden;
  font-size: 0;
}

.day-card {
  display: inline-block;
  width: 98px;
  margin-right: 10px;
  padding: 10px 6px;
  border-radius: 16px;
  background: rgba(255,255,255,0.08);
  text-align: center;
  vertical-align: top;
  font-size: 16px;
}

.day-name { font-size: 15px; margin-bottom: 6px; }
.day-icon { font-size: 24px; margin-bottom: 6px; }
.day-hi { font-size: 18px; font-weight: bold; }
.day-lo { font-size: 15px; opacity: 0.85; }

.hourly-wrap {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.14);
  text-align: left;
}

.hourly-title {
  font-size: 18px;
  margin-bottom: 10px;
  text-transform: uppercase;
  opacity: 0.85;
}

.hourly-row {
  white-space: nowrap;
  overflow: hidden;
  font-size: 0;
}

.hour-card {
  display: inline-block;
  width: 72px;
  margin-right: 10px;
  padding: 10px 6px;
  border-radius: 16px;
  background: rgba(255,255,255,0.08);
  text-align: center;
  vertical-align: top;
  font-size: 16px;
}

.hour-time { font-size: 15px; margin-bottom: 6px; }
.hour-icon { font-size: 26px; margin-bottom: 6px; }
.hour-temp { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
.hour-rain { font-size: 13px; opacity: 0.8; }

.footer {
  margin-top: 14px;
  font-size: 15px;
  opacity: 0.82;
}

.small { font-size: 18px; }
.dimmed { opacity: 0.82; }

@keyframes driftCloud { from { transform: translateX(0); } to { transform: translateX(980px); } }
@keyframes rainFall { from { transform: translateY(-40px); opacity: 0; } 10% { opacity: .8; } to { transform: translateY(850px); opacity: 0; } }
@keyframes snowFall { from { transform: translateY(-30px) translateX(0); opacity: 0; } 10% { opacity: .9; } 50% { transform: translateY(360px) translateX(18px); } to { transform: translateY(820px) translateX(-14px); opacity: 0; } }
@keyframes twinkle { 0%,100% { opacity: .25; transform: scale(1); } 50% { opacity: 1; transform: scale(1.6); } }
@keyframes floatSun { 0%,100% { transform: translateY(0); } 50% { transform: translateY(8px); } }
@keyframes floatMoon { 0%,100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
</style>
</head>
<body>
<div class="screen" id="screenEl">
  <div id="bgDay" class="bg-layer bg-fill sky-day active"></div>
  <div id="bgCloudy" class="bg-layer bg-fill sky-cloudy"></div>
  <div id="bgRain" class="bg-layer bg-fill sky-rain"></div>
  <div id="bgSnow" class="bg-layer bg-fill sky-snow"></div>
  <div id="bgNight" class="bg-layer bg-fill sky-night"></div>
  <div id="bgDecor" class="bg-layer"></div>

  <div class="content" id="contentEl">
    <div id="date" class="date"></div>
    <div id="time" class="time"></div>

    <div class="weather-box">
      <div class="weather-top">
        <div class="weather-top-left">
          <div id="weatherLocation" class="weather-desc">Home</div>
          <div id="weatherMain" class="weather-main">Loading...</div>
          <div id="weatherDesc" class="weather-desc">Connecting to weather service...</div>
          <div id="weatherDetails" class="weather-details"></div>
        </div>
        <div class="weather-top-right">
          <div id="weatherIcon" class="weather-icon">☁️</div>
        </div>
      </div>

      <div id="weatherPrediction" class="prediction"></div>

      <div class="daily-wrap">
        <div class="daily-title">3-Day Forecast</div>
        <div id="dailyRow" class="daily-row"></div>
      </div>

      <div class="hourly-wrap">
        <div class="hourly-title">Hourly Forecast</div>
        <div id="hourlyRow" class="hourly-row"></div>
      </div>
    </div>

    <div id="footer" class="footer">Weather updates every 10 minutes</div>
  </div>
</div>

<script>
(function () {
  var LAT = 40.674400;
  var LON = -79.989082;
  var LOCATION_NAME = 'Home';

  var screenEl = document.getElementById('screenEl');
  var contentEl = document.getElementById('contentEl');
  var bgDayEl = document.getElementById('bgDay');
  var bgCloudyEl = document.getElementById('bgCloudy');
  var bgRainEl = document.getElementById('bgRain');
  var bgSnowEl = document.getElementById('bgSnow');
  var bgNightEl = document.getElementById('bgNight');
  var bgDecorEl = document.getElementById('bgDecor');
  var dateEl = document.getElementById('date');
  var timeEl = document.getElementById('time');
  var weatherLocationEl = document.getElementById('weatherLocation');
  var weatherMainEl = document.getElementById('weatherMain');
  var weatherDescEl = document.getElementById('weatherDesc');
  var weatherDetailsEl = document.getElementById('weatherDetails');
  var weatherPredictionEl = document.getElementById('weatherPrediction');
  var weatherIconEl = document.getElementById('weatherIcon');
  var hourlyRowEl = document.getElementById('hourlyRow');
  var dailyRowEl = document.getElementById('dailyRow');
  var footerEl = document.getElementById('footer');

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function weekdayName(i) {
    var names = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    return names[i];
  }

  function shortDayName(i) {
    var names = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    return names[i];
  }

  function monthName(i) {
    var names = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    return names[i];
  }

  function updateClock() {
    var now = new Date();
    var h = now.getHours();
    var m = now.getMinutes();
    var s = now.getSeconds();
    var ampm = h >= 12 ? 'PM' : 'AM';
    var dh = h % 12;
    if (dh === 0) dh = 12;

    timeEl.innerHTML = dh + ':' + pad(m) + ':' + pad(s) + ' <span class="small">' + ampm + '</span>';
    dateEl.innerHTML = weekdayName(now.getDay()) + ', ' + monthName(now.getMonth()) + ' ' + now.getDate();
  }

  function weatherCodeToText(code) {
    var map = {
      0: 'Clear sky', 1: 'Mostly clear', 2: 'Partly cloudy', 3: 'Overcast', 45: 'Fog', 48: 'Rime fog',
      51: 'Light drizzle', 53: 'Drizzle', 55: 'Heavy drizzle', 56: 'Freezing drizzle', 57: 'Heavy freezing drizzle',
      61: 'Light rain', 63: 'Rain', 65: 'Heavy rain', 66: 'Freezing rain', 67: 'Heavy freezing rain',
      71: 'Light snow', 73: 'Snow', 75: 'Heavy snow', 77: 'Snow grains', 80: 'Rain showers', 81: 'Heavy rain showers',
      82: 'Violent rain showers', 85: 'Snow showers', 86: 'Heavy snow showers', 95: 'Thunderstorm',
      96: 'Thunderstorm with hail', 99: 'Severe thunderstorm with hail'
    };
    return map.hasOwnProperty(code) ? map[code] : 'Unknown conditions';
  }

  function weatherCodeToIcon(code, isDay) {
    if (code === 0) return isDay ? '☀️' : '🌙';
    if (code === 1) return isDay ? '🌤️' : '🌙';
    if (code === 2) return '⛅';
    if (code === 3) return '☁️';
    if (code === 45 || code === 48) return '🌫️';
    if (code === 51 || code === 53 || code === 55 || code === 56 || code === 57) return '🌦️';
    if (code === 61 || code === 63 || code === 65 || code === 66 || code === 67 || code === 80 || code === 81 || code === 82) return '🌧️';
    if (code === 71 || code === 73 || code === 75 || code === 77 || code === 85 || code === 86) return '❄️';
    if (code === 95 || code === 96 || code === 99) return '⛈️';
    return '☁️';
  }

  function clearActiveBackgrounds() {
    bgDayEl.className = 'bg-layer bg-fill sky-day';
    bgCloudyEl.className = 'bg-layer bg-fill sky-cloudy';
    bgRainEl.className = 'bg-layer bg-fill sky-rain';
    bgSnowEl.className = 'bg-layer bg-fill sky-snow';
    bgNightEl.className = 'bg-layer bg-fill sky-night';
  }

  function makeStars(count) {
    var html = '';
    var i;
    for (i = 0; i < count; i++) {
      html += '<div class="star" style="left:' + Math.round(Math.random() * 95) + '%; top:' + Math.round(Math.random() * 45) + '%; animation-delay:' + (Math.random() * 3).toFixed(2) + 's;"></div>';
    }
    return html;
  }

  function makeRain(count) {
    var html = '<div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>';
    var i;
    for (i = 0; i < count; i++) {
      html += '<div class="rain-drop" style="left:' + Math.round(Math.random() * 100) + '%; top:' + Math.round(Math.random() * 25) + '%; animation-delay:' + (Math.random() * 1.2).toFixed(2) + 's; animation-duration:' + (0.9 + Math.random() * 0.8).toFixed(2) + 's;"></div>';
    }
    return html;
  }

  function makeSnow(count) {
    var html = '<div class="cloud c1"></div><div class="cloud c2"></div>';
    var i;
    for (i = 0; i < count; i++) {
      html += '<div class="snow-flake" style="left:' + Math.round(Math.random() * 100) + '%; top:' + Math.round(Math.random() * 20) + '%; animation-delay:' + (Math.random() * 6).toFixed(2) + 's; animation-duration:' + (5 + Math.random() * 4).toFixed(2) + 's;"></div>';
    }
    return html;
  }

  function makeClouds(dayOrNight, body) {
    var html = body || '';
    html += '<div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>';
    if (dayOrNight === 'night') html += makeStars(20);
    return html;
  }

  function setAnimatedBackground(code, isDay) {
    clearActiveBackgrounds();
    bgDecorEl.innerHTML = '';

    var rainy = (code >= 51 && code <= 67) || (code >= 80 && code <= 82) || (code >= 95 && code <= 99);
    var snowy = (code >= 71 && code <= 77) || code === 85 || code === 86;
    var cloudy = code === 1 || code === 2 || code === 3 || code === 45 || code === 48;

    if (!isDay) {
      bgNightEl.className += ' active';
      if (rainy) {
        bgRainEl.className += ' active';
        bgDecorEl.innerHTML = makeRain(50);
      } else if (snowy) {
        bgSnowEl.className += ' active';
        bgDecorEl.innerHTML = makeSnow(32) + makeStars(12);
      } else if (cloudy) {
        bgCloudyEl.className += ' active';
        bgDecorEl.innerHTML = makeClouds('night', '<div class="moon"></div>');
      } else {
        bgDecorEl.innerHTML = makeClouds('night', '<div class="moon"></div>');
      }
      return;
    }

    if (rainy) {
      bgRainEl.className += ' active';
      bgDecorEl.innerHTML = makeRain(56);
    } else if (snowy) {
      bgSnowEl.className += ' active';
      bgDecorEl.innerHTML = makeSnow(34);
    } else if (cloudy) {
      bgCloudyEl.className += ' active';
      bgDecorEl.innerHTML = makeClouds('day', '<div class="sun"></div>');
    } else {
      bgDayEl.className += ' active';
      bgDecorEl.innerHTML = '<div class="sun"></div><div class="cloud c1"></div><div class="cloud c2"></div>';
    }
  }

  function shortTime(isoString) {
    if (!isoString) return '--';
    var d = new Date(isoString);
    var h = d.getHours();
    var m = d.getMinutes();
    var ampm = h >= 12 ? 'PM' : 'AM';
    var dh = h % 12;
    if (dh === 0) dh = 12;
    return dh + ':' + pad(m) + ' ' + ampm;
  }

  function setNightMode(currentHour, sunriseIso, sunsetIso) {
    var dim = false;
    if (currentHour >= 21 || currentHour < 7) dim = true;

    if (sunriseIso && sunsetIso) {
      var sunrise = new Date(sunriseIso);
      var sunset = new Date(sunsetIso);
      var now = new Date();
      if (now < sunrise || now > sunset) dim = true;
    }

    if (dim) {
      screenEl.className = 'screen dimmed';
    } else {
      screenEl.className = 'screen';
    }
  }

  function moveForBurnInProtection() {
    var x = Math.round((Math.random() * 8) - 4);
    var y = Math.round((Math.random() * 8) - 4);
    contentEl.style.transform = 'translate(' + x + 'px,' + y + 'px)';
  }

  function renderHourly(hourly) {
    if (!hourly || !hourly.time || !hourly.temperature_2m || !hourly.weather_code) {
      hourlyRowEl.innerHTML = '';
      return;
    }

    var now = new Date();
    var startIndex = 0;
    var i;

    for (i = 0; i < hourly.time.length; i++) {
      var hourDate = new Date(hourly.time[i]);
      if (hourDate >= now) {
        startIndex = i;
        break;
      }
    }

    var html = '';
    var endIndex = Math.min(startIndex + 8, hourly.time.length);

    for (i = startIndex; i < endIndex; i++) {
      var d = new Date(hourly.time[i]);
      var h = d.getHours();
      var label;
      if (i === startIndex) {
        label = 'Now';
      } else {
        var dh = h % 12;
        if (dh === 0) dh = 12;
        label = dh + (h >= 12 ? 'PM' : 'AM');
      }

      var icon = weatherCodeToIcon(hourly.weather_code[i], hourly.is_day && hourly.is_day[i] === 1);
      var temp = Math.round(hourly.temperature_2m[i]);
      var rain = hourly.precipitation_probability && hourly.precipitation_probability[i] != null ? Math.round(hourly.precipitation_probability[i]) : null;

      html += '<div class="hour-card">' +
        '<div class="hour-time">' + label + '</div>' +
        '<div class="hour-icon">' + icon + '</div>' +
        '<div class="hour-temp">' + temp + '&deg;</div>' +
        '<div class="hour-rain">' + (rain !== null ? rain + '%' : '') + '</div>' +
      '</div>';
    }

    hourlyRowEl.innerHTML = html;
  }

  function renderDaily(daily) {
    if (!daily || !daily.time || !daily.temperature_2m_max || !daily.temperature_2m_min || !daily.weather_code) {
      dailyRowEl.innerHTML = '';
      return;
    }

    var html = '';
    var days = Math.min(3, daily.time.length);
    var i;

    for (i = 0; i < days; i++) {
      var d = new Date(daily.time[i]);
      var dayName = i === 0 ? 'Today' : shortDayName(d.getDay());
      var icon = weatherCodeToIcon(daily.weather_code[i], true);
      html += '<div class="day-card">' +
        '<div class="day-name">' + dayName + '</div>' +
        '<div class="day-icon">' + icon + '</div>' +
        '<div class="day-hi">' + Math.round(daily.temperature_2m_max[i]) + '&deg;</div>' +
        '<div class="day-lo">' + Math.round(daily.temperature_2m_min[i]) + '&deg;</div>' +
      '</div>';
    }

    dailyRowEl.innerHTML = html;
  }

  function renderWeather(data) {
    if (!data || !data.current || !data.daily) {
      weatherMainEl.innerHTML = 'Weather error';
      weatherDescEl.innerHTML = 'Incomplete weather data';
      return;
    }

    var current = data.current;
    var daily = data.daily;
    var hourly = data.hourly || {};
    var desc = weatherCodeToText(current.weather_code);
    var hi = daily.temperature_2m_max && daily.temperature_2m_max.length ? Math.round(daily.temperature_2m_max[0]) : '--';
    var lo = daily.temperature_2m_min && daily.temperature_2m_min.length ? Math.round(daily.temperature_2m_min[0]) : '--';
    var sunrise = daily.sunrise && daily.sunrise.length ? shortTime(daily.sunrise[0]) : '--';
    var sunset = daily.sunset && daily.sunset.length ? shortTime(daily.sunset[0]) : '--';
    var precip = daily.precipitation_probability_max && daily.precipitation_probability_max.length ? Math.round(daily.precipitation_probability_max[0]) : null;
    var isDay = current.is_day === 1;
    var now = new Date();

    weatherLocationEl.innerHTML = LOCATION_NAME;
    weatherMainEl.innerHTML = Math.round(current.temperature_2m) + '&deg;F';
    weatherDescEl.innerHTML = desc;
    weatherIconEl.innerHTML = weatherCodeToIcon(current.weather_code, isDay);
    setAnimatedBackground(current.weather_code, isDay);
    setNightMode(now.getHours(), daily.sunrise && daily.sunrise[0], daily.sunset && daily.sunset[0]);

    weatherDetailsEl.innerHTML =
      'H:' + hi + '&deg;  L:' + lo + '&deg;<br>' +
      'Feels like ' + Math.round(current.apparent_temperature) + '&deg;F<br>' +
      'Wind ' + Math.round(current.wind_speed_10m) + ' mph<br>' +
      'Sunrise ' + sunrise + '  |  Sunset ' + sunset;

    var prediction = 'Today: ' + desc + '. ';
    if (precip !== null && precip >= 60) {
      prediction += 'A good chance of precipitation is expected today. ';
    } else if (precip !== null && precip >= 35) {
      prediction += 'There is a chance of precipitation later today. ';
    } else if (desc.indexOf('Thunderstorm') !== -1) {
      prediction += 'Stormy weather is possible today. ';
    } else if (desc.indexOf('rain') !== -1 || desc.indexOf('Rain') !== -1) {
      prediction += 'Rain is expected today. ';
    } else if (desc.indexOf('snow') !== -1 || desc.indexOf('Snow') !== -1) {
      prediction += 'Snow is expected today. ';
    } else if (desc.indexOf('cloud') !== -1 || desc.indexOf('Overcast') !== -1) {
      prediction += 'Clouds will hang around for much of the day. ';
    } else {
      prediction += 'Conditions should stay fairly steady through the day. ';
    }
    prediction += 'The high will be ' + hi + '&deg; and the low will be ' + lo + '&deg;.';
    weatherPredictionEl.innerHTML = prediction;

    renderDaily(daily);
    renderHourly(hourly);
    footerEl.innerHTML = 'Last updated ' + shortTime(now.toISOString()) + ' • refreshes every 10 minutes';
  }

  function fetchWeather() {
    weatherLocationEl.innerHTML = LOCATION_NAME;
    weatherMainEl.innerHTML = 'Loading...';
    weatherDescEl.innerHTML = 'Connecting to weather service...';

    var url =
      'https://api.open-meteo.com/v1/forecast?latitude=' + LAT +
      '&longitude=' + LON +
      '&current=temperature_2m,apparent_temperature,is_day,weather_code,wind_speed_10m,wind_direction_10m' +
      '&hourly=temperature_2m,weather_code,precipitation_probability,is_day' +
      '&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_probability_max' +
      '&forecast_days=3&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto';

    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);

    xhr.onreadystatechange = function () {
      if (xhr.readyState !== 4) return;

      if (xhr.status >= 200 && xhr.status < 300) {
        try {
          var data = JSON.parse(xhr.responseText);
          renderWeather(data);
        } catch (e) {
          weatherMainEl.innerHTML = 'Weather error';
          weatherDescEl.innerHTML = 'JSON parse failed';
          weatherDetailsEl.innerHTML = String(e);
          setTimeout(fetchWeather, 5000);
        }
      } else {
        weatherMainEl.innerHTML = 'Weather error';
        weatherDescEl.innerHTML = 'Request failed';
        weatherDetailsEl.innerHTML = 'Status: ' + xhr.status;
        setTimeout(fetchWeather, 5000);
      }
    };

    xhr.onerror = function () {
      weatherMainEl.innerHTML = 'Reconnecting...';
      weatherDescEl.innerHTML = 'Retrying weather download';
      weatherDetailsEl.innerHTML = 'Old Safari sometimes needs another try.';
      setTimeout(fetchWeather, 5000);
    };

    xhr.ontimeout = function () {
      weatherMainEl.innerHTML = 'Retrying...';
      weatherDescEl.innerHTML = 'Weather request timed out';
      weatherDetailsEl.innerHTML = 'Trying again in a few seconds.';
      setTimeout(fetchWeather, 5000);
    };

    xhr.timeout = 15000;
    xhr.send();
  }

  updateClock();
  setInterval(updateClock, 1000);
  moveForBurnInProtection();
  setInterval(moveForBurnInProtection, 5 * 60 * 1000);
  fetchWeather();
  setInterval(fetchWeather, 10 * 60 * 1000);
})();
</script>
</body>
</html>
