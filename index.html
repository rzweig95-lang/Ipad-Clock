<!DOCTYPE html>
<html>
<head>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Clock</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
}

.time{
font-size:120px;
font-weight:bold;
}

.date{
font-size:30px;
margin-top:10px;
opacity:.8;
}

.weather{
margin-top:40px;
font-size:40px;
}

.small{
font-size:22px;
opacity:.8;
margin-top:10px;
}

.forecast{
margin-top:30px;
font-size:24px;
}

.day{
margin-top:8px;
}

</style>

</head>

<body>

<div class="container">

<div id="time" class="time">--:--</div>

<div id="date" class="date"></div>

<div class="weather">

<div id="temp">--°</div>

<div id="desc" class="small">Loading weather...</div>

<div id="hiLo" class="small"></div>

</div>

<div class="forecast">

<div id="day1" class="day"></div>
<div id="day2" class="day"></div>
<div id="day3" class="day"></div>

</div>

</div>

<script>

function updateClock(){

var now=new Date();

var h=now.getHours();
var m=now.getMinutes();

var ampm=h>=12?"PM":"AM";

var dh=h%12;
if(dh===0) dh=12;

if(m<10) m="0"+m;

document.getElementById("time").innerHTML=dh+":"+m+" "+ampm;

document.getElementById("date").innerHTML=
now.toLocaleDateString(undefined,{
weekday:'long',
month:'long',
day:'numeric'
});

}

function loadWeather(){

fetch("weather.json")
.then(r=>r.json())
.then(data=>{

document.getElementById("temp").innerHTML=data.temp+"°";

document.getElementById("desc").innerHTML=data.desc;

document.getElementById("hiLo").innerHTML=
"High "+data.high+"° / Low "+data.low+"°";

document.getElementById("day1").innerHTML=
data.days[0].name+" "+data.days[0].high+"°/"+data.days[0].low+"°";

document.getElementById("day2").innerHTML=
data.days[1].name+" "+data.days[1].high+"°/"+data.days[1].low+"°";

document.getElementById("day3").innerHTML=
data.days[2].name+" "+data.days[2].high+"°/"+data.days[2].low+"°";

});

}

updateClock();

setInterval(updateClock,60000);

loadWeather();

setInterval(loadWeather,600000);

</script>

</body>

</html>
