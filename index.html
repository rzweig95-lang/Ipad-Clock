<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>iPad Clock + Weather</title>

<style>
html, body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#0f172a;
color:#ffffff;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
}

body{
display:table;
width:100%;
height:100%;
}

.screen{
display:table-cell;
vertical-align:middle;
text-align:center;
padding:18px;
box-sizing:border-box;
background:linear-gradient(to bottom,#0f172a 0%,#1e293b 100%);
position:relative;
}

.bg-layer{
position:absolute;
inset:0;
overflow:hidden;
pointer-events:none;
}

.sky-day{background:linear-gradient(to bottom,#4da3ff 0%,#7fc4ff 42%,#d7ecff 100%);} 
.sky-night{background:linear-gradient(to bottom,#091225 0%,#16213e 45%,#22345f 100%);} 
.sky-cloudy{background:linear-gradient(to bottom,#596579 0%,#7b889d 45%,#b7c1cf 100%);} 
.sky-rain{background:linear-gradient(to bottom,#2b3445 0%,#4b5a73 55%,#73839a 100%);} 
.sky-snow{background:linear-gradient(to bottom,#8294ad 0%,#a7b6c8 50%,#dbe5f0 100%);} 

.bg-fill{position:absolute;inset:0;opacity:0;transition:opacity 1.8s ease;}
.bg-fill.active{opacity:1;}

.sun{position:absolute;top:55px;right:80px;width:110px;height:110px;border-radius:50%;background:rgba(255,222,120,.95);box-shadow:0 0 40px rgba(255,210,120,.85),0 0 90px rgba(255,210,120,.45);animation:floatSun 12s ease-in-out infinite;}

.cloud{position:absolute;width:150px;height:50px;background:rgba(255,255,255,.42);border-radius:50px;animation:driftCloud 36s linear infinite;}

.cloud:before,.cloud:after{content:'';position:absolute;background:rgba(255,255,255,.42);border-radius:50%;}
.cloud:before{width:60px;height:60px;left:18px;top:-24px;}
.cloud:after{width:78px;height:78px;right:18px;top:-36px;}

.cloud.c1{top:90px;left:-180px;animation-duration:42s;}
.cloud.c2{top:170px;left:-240px;transform:scale(.8);animation-duration:56s;opacity:.7;}

.rain-drop{position:absolute;width:2px;height:18px;background:rgba(200,230,255,.7);animation:rainFall 1.3s linear infinite;}

.content{position:relative;z-index:2;}

.date{font-size:30px;margin-bottom:10px;letter-spacing:1px;}

.time{font-size:96px;font-weight:bold;margin:8px 0 20px 0;}

.weather-box{width:100%;max-width:700px;margin:0 auto;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);border-radius:24px;padding:24px;box-sizing:border-box;box-shadow:0 12px 40px rgba(0,0,0,.22);}

.weather-main{font-size:58px;font-weight:bold;margin-bottom:4px;}
.weather-desc{font-size:24px;margin-bottom:10px;}
.weather-details{font-size:22px;line-height:1.6;}

.weather-top{display:table;width:100%;margin-bottom:14px;}
.weather-top-left,.weather-top-right{display:table-cell;vertical-align:middle;}
.weather-top-right{width:120px;text-align:center;}
.weather-icon{font-size:68px;}

.prediction{margin-top:12px;font-size:24px;line-height:1.5;text-align:left;}

.hourly-wrap{margin-top:18px;padding-top:16px;border-top:1px solid rgba(255,255,255,.14);text-align:left;}
.hourly-title{font-size:18px;margin-bottom:12px;text-transform:uppercase;}

.hourly-row{white-space:nowrap;overflow:hidden;font-size:0;}
.hour-card{display:inline-block;width:72px;margin-right:10px;padding:10px 6px;border-radius:16px;background:rgba(255,255,255,.08);text-align:center;font-size:16px;}
.hour-time{font-size:15px;margin-bottom:6px;}
.hour-icon{font-size:26px;margin-bottom:6px;}
.hour-temp{font-size:18px;font-weight:bold;margin-bottom:4px;}
.hour-rain{font-size:13px;opacity:.8;}

.footer{margin-top:18px;font-size:16px;opacity:.72;}

@keyframes driftCloud{from{transform:translateX(0);}to{transform:translateX(980px);}}
@keyframes rainFall{from{transform:translateY(-40px);opacity:0;}10%{opacity:.8;}to{transform:translateY(850px);opacity:0;}}
@keyframes floatSun{0%,100%{transform:translateY(0);}50%{transform:translateY(8px);}}
</style>
</head>

<body>

<div class="screen">
<div id="bgDay" class="bg-layer bg-fill sky-day active"></div>
<div id="bgDecor" class="bg-layer"></div>

<div class="content">

<div id="date" class="date"></div>
<div id="time" class="time"></div>

<div class="weather-box">

<div class="weather-top">
<div class="weather-top-left">
<div id="weatherLocation" class="weather-desc">Your Area</div>
<div id="weatherMain" class="weather-main"></div>
<div id="weatherDesc" class="weather-desc"></div>
<div id="weatherDetails" class="weather-details"></div>
</div>
<div class="weather-top-right">
<div id="weatherIcon" class="weather-icon">☁️</div>
</div>
</div>

<div id="weatherPrediction" class="prediction"></div>

<div class="hourly-wrap">
<div class="hourly-title">Hourly Forecast</div>
<div id="hourlyRow" class="hourly-row"></div>
</div>

</div>

<div class="footer">Weather updates every 10 minutes</div>

</div>
</div>

<script>

(function(){

var LAT = 40.674400;
var LON = -79.989082;
var LOCATION_NAME = "Home";

var dateEl=document.getElementById('date');
var timeEl=document.getElementById('time');
var weatherLocationEl=document.getElementById('weatherLocation');
var weatherMainEl=document.getElementById('weatherMain');
var weatherDescEl=document.getElementById('weatherDesc');
var weatherDetailsEl=document.getElementById('weatherDetails');
var weatherPredictionEl=document.getElementById('weatherPrediction');
var weatherIconEl=document.getElementById('weatherIcon');
var hourlyRowEl=document.getElementById('hourlyRow');

function pad(n){return n<10?'0'+n:n;}

function updateClock(){
var now=new Date();
var h=now.getHours();
var m=now.getMinutes();
var s=now.getSeconds();
var ampm=h>=12?'PM':'AM';
var dh=h%12;if(dh===0)dh=12;

timeEl.innerHTML=dh+":"+pad(m)+":"+pad(s)+" <span style='font-size:18px'>"+ampm+"</span>";

dateEl.innerHTML=now.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
}

function weatherCodeToIcon(code,isDay){
if(code===0)return isDay?'☀️':'🌙';
if(code===1)return '🌤️';
if(code===2)return '⛅';
if(code===3)return '☁️';
if(code>=61&&code<=67)return '🌧️';
if(code>=71&&code<=77)return '❄️';
if(code>=95)return '⛈️';
return '☁️';
}

function fetchWeather(){

var url='https://api.open-meteo.com/v1/forecast?latitude='+LAT+
'&longitude='+LON+
'&current=temperature_2m,apparent_temperature,is_day,weather_code,wind_speed_10m,wind_direction_10m'+
'&hourly=temperature_2m,weather_code,precipitation_probability,is_day'+
'&daily=temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_probability_max'+
'&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto';

var xhr=new XMLHttpRequest();
xhr.open('GET',url,true);

xhr.onreadystatechange=function(){

if(xhr.readyState!==4)return;

if(xhr.status>=200&&xhr.status<300){

var data=JSON.parse(xhr.responseText);
renderWeather(data);

}

};

xhr.send();

}

function renderWeather(data){

var current=data.current;
var daily=data.daily;
var hourly=data.hourly;

var hi=Math.round(daily.temperature_2m_max[0]);
var lo=Math.round(daily.temperature_2m_min[0]);

weatherLocationEl.innerHTML=LOCATION_NAME;

weatherMainEl.innerHTML=Math.round(current.temperature_2m)+"°F";
weatherDescEl.innerHTML="Feels like "+Math.round(current.apparent_temperature)+"°";

weatherIconEl.innerHTML=weatherCodeToIcon(current.weather_code,current.is_day===1);

weatherDetailsEl.innerHTML="High "+hi+"° / Low "+lo+"°<br>Wind "+Math.round(current.wind_speed_10m)+" mph";

weatherPredictionEl.innerHTML="Today's high will be "+hi+"° and the low will be "+lo+"°.";

renderHourly(hourly);

}

function renderHourly(hourly){

var now=new Date();
var startIndex=0;

for(var i=0;i<hourly.time.length;i++){

var d=new Date(hourly.time[i]);

if(d>=now){
startIndex=i;
break;
}

}

var html="";

for(var j=startIndex;j<startIndex+8;j++){

var d2=new Date(hourly.time[j]);
var hour=d2.getHours();
var label=(hour%12||12)+(hour>=12?'PM':'AM');

var icon=weatherCodeToIcon(hourly.weather_code[j],hourly.is_day[j]===1);

var temp=Math.round(hourly.temperature_2m[j]);

html+="<div class='hour-card'>"+
"<div class='hour-time'>"+label+"</div>"+
"<div class='hour-icon'>"+icon+"</div>"+
"<div class='hour-temp'>"+temp+"°</div>"+
"</div>";

}

hourlyRowEl.innerHTML=html;

}

updateClock();
setInterval(updateClock,1000);

renderWeather({
  current: {
    temperature_2m: 58,
    apparent_temperature: 56,
    is_day: 1,
    weather_code: 2,
    wind_speed_10m: 7,
    wind_direction_10m: 180
  },
  daily: {
    temperature_2m_max: [62],
    temperature_2m_min: [44],
    sunrise: ['2026-03-30T07:02'],
    sunset: ['2026-03-30T19:34'],
    precipitation_probability_max: [20]
  },
  hourly: {
    time: [
      '2026-03-30T10:00','2026-03-30T11:00','2026-03-30T12:00','2026-03-30T13:00',
      '2026-03-30T14:00','2026-03-30T15:00','2026-03-30T16:00','2026-03-30T17:00'
    ],
    temperature_2m: [56,57,58,60,61,61,59,57],
    weather_code: [2,2,1,1,2,3,3,2],
    precipitation_probability: [10,10,5,5,10,15,20,15],
    is_day: [1,1,1,1,1,1,1,1]
  }
});

})();

</script>

</body>
</html>
